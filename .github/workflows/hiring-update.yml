name: Daily Hiring Pipeline Digest

on:
  schedule:
    # Weekday mornings at 7:00 UTC (9:00 AM EET / 10:00 AM EEST)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      lookback_override:
        description: 'Override lookback hours (default: use config.yaml values)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run hiring digest script
        env:
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python hiring_update.py
